                      <YAxis tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={(v, n) => [fmt$(v), n]} />
                      <Bar dataKey="mtm" name="MTM Revenue" stackId={granularity !== 'Daily' ? "r" : undefined} fill="#378ADD" radius={granularity === 'Daily' ? [3,3,0,0] : [0,0,0,0]} />
                      {granularity !== 'Daily' && (
                        <Bar dataKey="mdv" name="Modivcare Revenue" stackId="r" fill="#AFA9EC" radius={[3,3,0,0]} />
                      )}
                      <ReferenceLine y={trendBreakeven.revenue} stroke="#EF9F27" strokeDasharray="6 3" label={{ value: "Break even", position: "insideTopRight", fill: "#EF9F27", fontSize: 10 }} />
                      <ReferenceLine y={trendGoal.revenue} stroke="#639922" strokeDasharray="6 3" label={{ value: "Profit goal", position: "insideTopRight", fill: "#639922", fontSize: 10 }} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ display: "flex", gap: 20, alignItems: "center", fontSize: 11, color: MUTED }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#EF9F27" strokeWidth="2" strokeDasharray="6 3" /></svg>
                    <span>Break even</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#639922" strokeWidth="2" strokeDasharray="6 3" /></svg>
                    <span>Profit goal</span>
                  </div>
                </div>

              </div>
            )}

            {/* ── FULL HISTORY ── */}
            {tab === "Full History" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

                {/* Stat cards */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
                  <StatCard label="Total Revenue" value="$2,016K" sub="All time" accent={GREEN} />
                  <StatCard label="Total Trips" value="26,418" sub="All time" accent={BLUE} />
                  <StatCard label="MTM Revenue" value="$1,761K" sub="22,572 trips · 87%" accent={BLUE} />
                  <StatCard label="Modivcare Revenue" value="$255K" sub="3,846 trips · 13%" accent={PURPLE} />
                  <StatCard label="Peak Month" value="$154K" sub="Apr 2025" accent={ACCENT} />
                  <StatCard label="Avg $/Trip MTM" value="$78.00" sub="All time avg" accent="#378ADD" />
                </div>

                {/* Toggle controls */}
                <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span style={{ color: MUTED, fontSize: 12 }}>View:</span>
                    {[["revenue", "Revenue"], ["trips", "Trips"]].map(([v, label]) => (
                      <button key={v} onClick={() => setHistView(v)} style={{
                        background: histView === v ? BLUE : CARD,
                        border: `1px solid ${histView === v ? BLUE : BORDER}`,
                        borderRadius: 6, color: histView === v ? "#fff" : MUTED,
                        padding: "4px 14px", fontSize: 11, cursor: "pointer",
                      }}>{label}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span style={{ color: MUTED, fontSize: 12 }}>Period:</span>
                    {[["monthly", "Monthly"], ["weekly", "Weekly"]].map(([v, label]) => (
                      <button key={v} onClick={() => setHistPeriod(v)} style={{
                        background: histPeriod === v ? BLUE : CARD,
                        border: `1px solid ${histPeriod === v ? BLUE : BORDER}`,
                        borderRadius: 6, color: histPeriod === v ? "#fff" : MUTED,
                        padding: "4px 14px", fontSize: 11, cursor: "pointer",
                      }}>{label}</button>
                    ))}
                  </div>
                </div>

                {/* Stacked bar chart */}
                {(() => {
                  const src = histPeriod === 'monthly' ? HISTORY_MONTHLY : HISTORY_WEEKLY;
                  const labelKey = histPeriod === 'monthly' ? 'month' : 'week';
                  const isWeekly = histPeriod === 'weekly';
                  const chartData = src.map(d => ({
                    label: d[labelKey],
                    mtm: histView === 'revenue' ? d.mtmRevenue : d.mtmTrips,
                    mdv: histView === 'revenue' ? d.modRevenue : d.modTrips,
                  }));
                  return (
                    <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                      <SectionTitle>{histView === 'revenue' ? 'Revenue' : 'Trips'} — MTM + Modivcare</SectionTitle>
                      <ResponsiveContainer width="100%" height={300}>
                        <BarChart data={chartData} barCategoryGap="20%">
                          <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                          <XAxis
                            dataKey="label"
                            tick={isWeekly ? { fill: MUTED, fontSize: 9, angle: -45, textAnchor: 'end' } : { fill: MUTED, fontSize: 10 }}
                            interval={isWeekly ? 3 : 0}
                            height={isWeekly ? 55 : 30}
                            axisLine={false} tickLine={false}
                          />
                          <YAxis
                            tickFormatter={histView === 'revenue' ? (v => "$" + (v/1000).toFixed(0) + "k") : (v => v)}
                            tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false}
                          />
                          <Tooltip contentStyle={TooltipStyle} formatter={(v, n) => [histView === 'revenue' ? fmt$(v) : Math.round(v).toLocaleString(), n]} />
                          <Legend formatter={v => <span style={{ color: "#94a3b8", fontSize: 11 }}>{v}</span>} />
                          <Bar dataKey="mtm" name="MTM" stackId="s" fill="#378ADD" radius={[0,0,0,0]} />
                          <Bar dataKey="mdv" name="Modivcare" stackId="s" fill="#AFA9EC" radius={[3,3,0,0]} />
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  );
                })()}

                {/* Avg $/trip line chart — monthly only */}
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Avg Revenue / Trip by Month</SectionTitle>
                  <ResponsiveContainer width="100%" height={220}>
                    <LineChart data={HISTORY_MONTHLY.map(d => ({
                      month: d.month,
                      mtmAvg: d.mtmTrips > 0 ? Math.round(d.mtmRevenue / d.mtmTrips * 100) / 100 : null,
                      mdvAvg: d.modTrips > 0 ? Math.round(d.modRevenue / d.modTrips * 100) / 100 : null,
                    }))}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} />
                      <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 10, angle: -30, textAnchor: 'end' }} height={45} axisLine={false} tickLine={false} />
                      <YAxis tickFormatter={v => "$" + v} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={(v, n) => ["$" + Number(v).toFixed(2), n]} />
                      <ReferenceLine y={100500/1150} stroke="#EF9F27" strokeDasharray="6 3" label={{ value: "Break even rate", position: "insideTopRight", fill: "#EF9F27", fontSize: 10 }} />
                      <Line type="monotone" dataKey="mtmAvg" name="MTM Avg $/Trip" stroke="#378ADD" strokeWidth={2} dot={{ r: 3, fill: "#378ADD" }} connectNulls />
                      <Line type="monotone" dataKey="mdvAvg" name="Modivcare Avg $/Trip" stroke="#AFA9EC" strokeWidth={2} strokeDasharray="5 3" dot={{ r: 3, fill: "#AFA9EC" }} connectNulls />
                    </LineChart>
                  </ResponsiveContainer>
                  <div style={{ display: "flex", gap: 20, alignItems: "center", fontSize: 11, color: MUTED, marginTop: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#EF9F27" strokeWidth="2" strokeDasharray="6 3" /></svg>
                      <span>Break even rate (~$87.39/trip at 1,150 trips)</span>
                    </div>
                  </div>
                </div>

                {/* Footer note */}
                <div style={{ textAlign: "center", color: MUTED, fontSize: 11, padding: "4px 0 8px" }}>
                  Dec 2, 2024 – Apr 30, 2026 · 74 weeks · 17 months · MTM + Modivcare · 10 source files
                </div>

              </div>
            )}

            {/* ── MTM DETAIL ── */}
            {tab === "MTM Detail" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <StatCard label="Valid Trips" value="22,572" sub="Dec '24–Apr '26" accent={BLUE} />
                  <StatCard label="Total Revenue" value="$1,760,936" sub="VALID trips only" accent={GREEN} />
                  <StatCard label="Avg / Trip" value="$78.14" sub="All valid trips" accent={ACCENT} />
                  <StatCard label="Total Miles" value="181,897" sub="Valid trips" accent={BLUE} />
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Monthly Revenue</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={MTM_MONTHLY}>
                        <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                        <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                        <YAxis tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                        <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                        <Bar dataKey="revenue" name="Revenue" radius={[3,3,0,0]}>
                          {MTM_MONTHLY.map((m, i) => <Cell key={i} fill={m.month === "Apr '26" ? "#1e3a5f" : BLUE} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Trip Status Breakdown</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <PieChart>
                        <Pie data={MTM_STATUS} dataKey="value" cx="42%" cy="50%" innerRadius={45} outerRadius={75} paddingAngle={2}>
                          {MTM_STATUS.map((s, i) => <Cell key={i} fill={s.color} />)}
                        </Pie>
                        <Tooltip contentStyle={TooltipStyle} formatter={v => v.toLocaleString()} />
                        <Legend iconSize={7} iconType="circle" formatter={v => <span style={{ color: "#64748b", fontSize: 10 }}>{v}</span>} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Monthly Trip &amp; Revenue Summary</SectionTitle>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                        {["Month", "Valid Trips", "Revenue", "Miles", "Avg $/Trip", "$/Mile"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 12px", color: MUTED, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {MTM_MONTHLY.map((m, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${BORDER}22` }}>
                          <td style={{ padding: "10px 12px", fontFamily: "monospace", color: "#cbd5e1", fontSize: 12 }}>
                            {m.month}
                          </td>
                          <td style={{ padding: "10px 12px" }}>{m.trips.toLocaleString()}</td>
                          <td style={{ padding: "10px 12px", color: GREEN, fontWeight: 600 }}>{fmt$(m.revenue)}</td>
                          <td style={{ padding: "10px 12px" }}>{m.miles.toLocaleString()}</td>
                          <td style={{ padding: "10px 12px" }}>${(m.revenue / m.trips).toFixed(2)}</td>
                          <td style={{ padding: "10px 12px", color: ACCENT }}>${m.rpm.toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Top Pickup Cities (Oct–Mar)</SectionTitle>
                  <ResponsiveContainer width="100%" height={220}>
                    <BarChart data={MTM_CITIES} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <YAxis dataKey="city" type="category" width={85} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} />
                      <Bar dataKey="trips" name="Trips" radius={[0,3,3,0]}>
                        {MTM_CITIES.map((_, i) => <Cell key={i} fill={i === 0 ? ACCENT : i === 1 ? BLUE : "#1e3a5f"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            {/* ── MODIVCARE DETAIL ── */}
            {tab === "Modivcare Detail" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <StatCard label="Total Trips" value="251" sub="Mar–Apr '26" accent={PURPLE} />
                  <StatCard label="Total Revenue" value={fmt$(mdvTotalRev)} sub="Billed and completed" accent={GREEN} />
                  <StatCard label="Avg / Trip" value="$33.34" sub="vs MTM $78.14" accent={ACCENT} />
                  <StatCard label="Months of Data" value="2" sub="More incoming" accent={PURPLE} />
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Monthly Revenue — Modivcare</SectionTitle>
                  <ResponsiveContainer width="100%" height={180}>
                    <BarChart data={MDV_MONTHLY}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                      <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                      <YAxis tickFormatter={v => "$" + (v/1000).toFixed(1) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" fill={PURPLE} radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Driver Performance — Modivcare</SectionTitle>
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={MDV_DRIVERS} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => "$" + v} />
                      <YAxis dataKey="name" type="category" width={130} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" radius={[0,4,4,0]}>
                        {MDV_DRIVERS.map((_, i) => <Cell key={i} fill={i === 0 ? PURPLE : i === 1 ? ACCENT : "#2d1b4e"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20, borderLeft: `3px solid ${ACCENT}` }}>
                  <SectionTitle>Rate Comparison</SectionTitle>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                    {[
                      { label: "MTM Avg/Trip", value: "$78.14", color: BLUE },
                      { label: "Modivcare Avg/Trip", value: "$33.34", color: PURPLE },
                      { label: "MTM Premium", value: "+137%", color: ACCENT },
                    ].map(s => (
                      <div key={s.label} style={{ background: "#091422", borderRadius: 8, padding: "14px 16px", textAlign: "center" }}>
                        <div style={{ color: MUTED, fontSize: 10, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>{s.label}</div>
                        <div style={{ color: s.color, fontSize: 24, fontWeight: 800 }}>{s.value}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, padding: "10px 14px", background: "#091422", borderRadius: 8, borderLeft: `2px solid ${ACCENT}`, fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
                    💡 Modivcare pays 137% less per trip than MTM. Direct Medicaid billing eliminates broker margin entirely, making it the highest-leverage revenue growth path.
                  </div>
                </div>
              </div>
            )}

            {/* ── DRIVER PERFORMANCE ── */}
            {tab === "Driver Performance" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ color: MUTED, fontSize: 12 }}>Broker:</span>
                  {["MTM", "Modivcare"].map(b => (
                    <button key={b} onClick={() => setDriverBroker(b)} style={{
                      background: driverBroker === b ? (b === "MTM" ? BLUE : PURPLE) : CARD,
                      border: `1px solid ${driverBroker === b ? (b === "MTM" ? BLUE : PURPLE) : BORDER}`,
                      borderRadius: 6, color: driverBroker === b ? "#fff" : MUTED,
                      padding: "4px 14px", fontSize: 11, cursor: "pointer",
                    }}>{b}</button>
                  ))}
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Driver Revenue — {driverBroker}</SectionTitle>
                  <ResponsiveContainer width="100%" height={320}>
                    <BarChart data={drivers} layout="vertical" margin={{ left: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} />
                      <YAxis dataKey="name" type="category" width={145} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" radius={[0,4,4,0]}>
                        {drivers.map((_, i) => <Cell key={i} fill={i === 0 ? ACCENT : i === 1 ? (driverBroker === "MTM" ? BLUE : PURPLE) : "#1e3a5f"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Driver Metrics — {driverBroker}</SectionTitle>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                        {["Driver", "Trips", "Revenue", "Avg $/Trip"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 12px", color: MUTED, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {drivers.map((d, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${BORDER}22` }}>
                          <td style={{ padding: "10px 12px", color: i < 3 ? ACCENT : "#cbd5e1", fontWeight: i < 3 ? 600 : 400 }}>
                            {i < 3 && <span style={{ color: ACCENT, marginRight: 6, fontSize: 10, fontFamily: "monospace" }}>#{i+1}</span>}
                            {d.name}
                          </td>
                          <td style={{ padding: "10px 12px" }}>{d.trips.toLocaleString()}</td>
                          <td style={{ padding: "10px 12px", color: GREEN }}>{fmt$(d.revenue)}</td>
                          <td style={{ padding: "10px 12px" }}>${d.avg.toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
