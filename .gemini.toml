[project]
name = "nemt-scraper"
# The 'eyes' of your agent - these files stay in context
context_files = ["scraper.py", "opioid_clinic_data.csv"]

[rules]
# Hard business rules for the agent to follow
enforce = [
  "Always use Illinois (Central) time for logging",
  "Use 'nemt_env' for all pip installs or test runs",
  "Do not output PII (names/addresses) to the terminal",
  "Verify all MTM/Modivcare selectors against the latest portal scan"
]

[tools]
# This allows the agent to actually check if the portals are up
allow = ["web_search", "web_fetch", "terminal"]
