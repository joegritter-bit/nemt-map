<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}
#root{max-width:1200px;margin:0 auto;padding:20px}
.header{background:linear-gradient(135deg,#1F3864,#2563a8);color:#fff;border-radius:12px;padding:24px 28px;margin-bottom:20px}
.header h1{font-size:22px;font-weight:600;margin-bottom:4px}
.header p{font-size:13px;opacity:0.8}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:#1F3864}
.card-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.chart-box{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px}
.chart-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:4px}
.chart-sub{font-size:12px;color:#9ca3af;margin-bottom:16px}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:transparent;border:1px solid #d1d5db;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;color:#6b7280;transition:all .15s}
.tab.active{background:#1F3864;color:#fff;border-color:#1F3864}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:2px}
.back-link{display:inline-block;margin-bottom:16px;font-size:13px;color:#2563a8;text-decoration:none}
.back-link:hover{text-decoration:underline}
.data-note{font-size:11px;color:#9ca3af;text-align:center;margin-top:8px}
</style>
</head>

function CustomTooltip({ active, payload, label, view }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{background:'#fff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px',fontSize:12,boxShadow:'0 4px 12px rgba(0,0,0,0.1)'}}>
      <p style={{fontWeight:600,marginBottom:6,color:'#374151'}}>{label}</p>
      {payload.map((p,i) => (
        <p key={i} style={{color:p.color,margin:'2px 0'}}>
          {p.name}: {view==='trips' ? fmtN(p.value) : fmt$(p.value)}
        </p>
      ))}
    </div>
  );
}

  })) : WEEKLY_DATA.map(d => ({
    name: d.week,
    MTM: view==='trips' ? d.mtmTrips : d.mtmRevenue,
    Modivcare: view==='trips' ? d.modTrips : d.modRevenue,
  }));

  const avgData = MONTHLY_DATA.map(d => ({
    name: d.month,
    'MTM avg': d.mtmTrips > 0 ? Math.round(d.mtmRevenue/d.mtmTrips*100)/100 : 0,
    'Modivcare avg': d.modTrips > 0 ? Math.round(d.modRevenue/d.modTrips*100)/100 : 0,
  }));

  const chartHeight = period === 'weekly' ? 280 : 300;
  const tickCount = period === 'weekly' ? 72 : 17;

  return (
    <div id="root">
      <a href="../index.html" className="back-link">← Back to Map</a>

      <div className="header">
        <h1>Effingham Transport — Analytics Dashboard</h1>
        <p>Dec 2, 2024 – Apr 18, 2026 &nbsp;·&nbsp; MTM + Modivcare (Direct + RouteGenie) &nbsp;·&nbsp; Complete dataset</p>
      </div>

      <div className="cards">
        <div className="card">
          <div className="card-label">Total Revenue</div>
          <div className="card-value">${Math.round(totalRev/1000).toLocaleString()}K</div>
          <div className="card-sub">All time</div>
        </div>
        <div className="card">
          <div className="card-label">Total Trips</div>
          <div className="card-value">{totalTrips.toLocaleString()}</div>
          <div className="card-sub">All time</div>
        </div>
        <div className="card">
          <div className="card-label">MTM Revenue</div>
          <div className="card-value">${Math.round(totalMTMRev/1000).toLocaleString()}K</div>
          <div className="card-sub">{totalMTMTrips.toLocaleString()} trips · {Math.round(totalMTMRev/totalRev*100)}%</div>
        </div>
        <div className="card">
          <div className="card-label">Modivcare Revenue</div>
          <div className="card-value">${Math.round(totalModRev/1000).toLocaleString()}K</div>
          <div className="card-sub">{totalModTrips.toLocaleString()} trips · {Math.round(totalModRev/totalRev*100)}%</div>
        </div>
        <div className="card">
          <div className="card-label">Peak Month</div>
          <div className="card-value">{fmtK(peakMonth.totalRevenue)}</div>
          <div className="card-sub">{peakMonth.month}</div>
        </div>
        <div className="card">
          <div className="card-label">Avg $/Trip (MTM)</div>
          <div className="card-value">${Math.round(totalMTMRev/totalMTMTrips)}</div>
          <div className="card-sub">vs ${Math.round(totalModRev/totalModTrips)} Modivcare</div>
        </div>
      </div>

      <div className="chart-box">
        <div className="chart-title">Trips & Revenue by Broker</div>
        <div className="chart-sub">Stacked by MTM and Modivcare</div>
        <div className="tabs">
          {['revenue','trips'].map(v => (
            <button key={v} className={`tab${view===v?' active':''}`} onClick={()=>setView(v)}>
              {v.charAt(0).toUpperCase()+v.slice(1)}
            </button>
          ))}
          <div style={{flex:1}}/>
          {['monthly','weekly'].map(p => (
            <button key={p} className={`tab${period===p?' active':''}`} onClick={()=>setPeriod(p)}>
              {p.charAt(0).toUpperCase()+p.slice(1)}
            </button>
          ))}
        </div>
        <div className="legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#1F3864'}}/> MTM</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#1D9E75'}}/> Modivcare</div>
        </div>
        <ResponsiveContainer width="100%" height={chartHeight}>
          <BarChart data={chartData} margin={{top:4,right:8,left:8,bottom:period==='weekly'?50:30}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
            <XAxis dataKey="name" tick={{fontSize: period==='weekly'?8:11}} angle={period==='weekly'?-45:0} textAnchor={period==='weekly'?"end":"middle"} interval={period==='weekly'?3:0}/>
            <YAxis tickFormatter={view==='trips'?fmtN:fmtK} tick={{fontSize:11}} width={55}/>
            <Tooltip content={<CustomTooltip view={view}/>}/>
            <Bar dataKey="MTM" stackId="a" fill="#1F3864" radius={[0,0,0,0]}/>
            <Bar dataKey="Modivcare" stackId="a" fill="#1D9E75" radius={[3,3,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
        <p className="data-note">{period==='weekly' ? '72 weeks' : '17 months'} · Dec 2024 – Apr 2026</p>
      </div>

      <div className="chart-box">
        <div className="chart-title">Avg Revenue per Trip</div>
        <div className="chart-sub">Monthly comparison: MTM vs Modivcare</div>
        <ResponsiveContainer width="100%" height={240}>
          <LineChart data={avgData} margin={{top:4,right:8,left:8,bottom:30}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
            <XAxis dataKey="name" tick={{fontSize:10}} angle={-30} textAnchor="end" interval={0}/>
            <YAxis tickFormatter={v=>'$'+v} tick={{fontSize:11}} width={45}/>
            <Tooltip formatter={v=>'$'+Number(v).toFixed(2)}/>
            <Line type="monotone" dataKey="MTM avg" stroke="#1F3864" strokeWidth={2} dot={{r:3}}/>
            <Line type="monotone" dataKey="Modivcare avg" stroke="#1D9E75" strokeWidth={2} dot={{r:3}} strokeDasharray="4 2"/>
          </LineChart>
        </ResponsiveContainer>
        <div className="legend" style={{marginTop:8}}>
          <div className="legend-item"><div className="legend-dot" style={{background:'#1F3864'}}/> MTM avg $/trip</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#1D9E75',borderBottom:'2px dashed #1D9E75'}}/> Modivcare avg $/trip</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
