<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEMT Analytics Dashboard — Effingham Transport</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #0d1b2a; }
    #root { min-height: 100vh; }
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1b2a; }
    ::-webkit-scrollbar-thumb { background: #1e3348; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a4a6b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;
    const {
      BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid,
      Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend,
      ComposedChart, Area, ReferenceLine
    } = Recharts;

    // ── Data ──────────────────────────────────────────────────────────────────

    const MONTHLY_EXPENSES = 95000;

    const MTM_MONTHLY = [
      { month: "Oct '25", trips: 1441, revenue: 110652, miles: 32699 },
      { month: "Nov '25", trips: 1225, revenue: 94864,  miles: 28171 },
      { month: "Dec '25", trips: 1085, revenue: 84918,  miles: 26048 },
      { month: "Jan '26", trips: 1076, revenue: 80173,  miles: 25496 },
      { month: "Feb '26", trips: 1053, revenue: 83657,  miles: 28452 },
      { month: "Mar '26", trips: 1085, revenue: 91268,  miles: 31658 },
    ];

    const MDV_MONTHLY = [
      { month: "Mar '26", trips: 114,  revenue: 3501  },
      { month: "Apr '26", trips: 137,  revenue: 4868  },
    ];

    const ALL_MONTHS = ["Oct '25","Nov '25","Dec '25","Jan '26","Feb '26","Mar '26","Apr '26"];

    const COMBINED_MONTHLY = ALL_MONTHS.map((month) => {
      const mtm = MTM_MONTHLY.find(m => m.month === month);
      const mdv = MDV_MONTHLY.find(m => m.month === month);
      const mtmRev   = mtm ? mtm.revenue : 0;
      const mdvRev   = mdv ? mdv.revenue : 0;
      const totalRev = mtmRev + mdvRev;
      const mtmTrips = mtm ? mtm.trips : 0;
      const mdvTrips = mdv ? mdv.trips : 0;
      const hasData  = mtmRev > 0 || mdvRev > 0;
      const expenses = hasData ? MONTHLY_EXPENSES : 0;
      return {
        month,
        mtmRevenue: mtmRev,
        mdvRevenue: mdvRev,
        revenue: totalRev,
        expenses,
        net: totalRev - expenses,
        mtmTrips,
        mdvTrips,
        trips: mtmTrips + mdvTrips,
        miles: mtm ? mtm.miles : null,
      };
    });

    let cumSum = 0;
    COMBINED_MONTHLY.forEach(m => {
      if (m.expenses > 0) cumSum += m.net;
      m.cumulative = m.expenses > 0 ? cumSum : null;
    });

    const MTM_DRIVERS = [
      { name: "Norma Roderick",   trips: 1498, revenue: 92737, avg: 61.91 },
      { name: "Jack Wiseman",      trips: 691,  revenue: 64825, avg: 93.81 },
      { name: "Gary D Davis",      trips: 540,  revenue: 41961, avg: 77.71 },
      { name: "Debbie Reddish",    trips: 515,  revenue: 33245, avg: 64.55 },
      { name: "Bradford Thoele",   trips: 432,  revenue: 34848, avg: 80.67 },
      { name: "Michael Esker",     trips: 321,  revenue: 28030, avg: 87.32 },
      { name: "Steven Schumacher", trips: 328,  revenue: 27796, avg: 84.74 },
      { name: "Nancy Merritt",     trips: 311,  revenue: 26506, avg: 85.23 },
      { name: "Shannon Henderson", trips: 232,  revenue: 26269, avg: 113.23 },
      { name: "Michael Schabbing", trips: 298,  revenue: 24474, avg: 82.13 },
    ];

    const MDV_DRIVERS = [
      { name: "Gary Davis",        trips: 107, revenue: 1847, avg: 17.26 },
      { name: "Jack Wiseman",      trips: 19,  revenue: 1357, avg: 71.43 },
      { name: "Shannon Henderson", trips: 18,  revenue: 1229, avg: 68.30 },
      { name: "Steven Cothern",    trips: 18,  revenue: 1035, avg: 57.50 },
      { name: "Norma Roderick",    trips: 47,  revenue: 791,  avg: 16.84 },
      { name: "Jill OBryan",       trips: 10,  revenue: 766,  avg: 76.64 },
      { name: "Brandy Wakeland",   trips: 8,   revenue: 507,  avg: 63.41 },
      { name: "Nancy Merritt",     trips: 6,   revenue: 470,  avg: 78.33 },
      { name: "Tammy Goodman",     trips: 16,  revenue: 311,  avg: 19.43 },
      { name: "Kevin Cornwell",    trips: 2,   revenue: 54,   avg: 27.07 },
    ];

    const MTM_STATUS = [
      { name: "Valid",              value: 6966, color: "#22c55e" },
      { name: "Member Cancel",      value: 1324, color: "#f59e0b" },
      { name: "Turn Back",          value: 728,  color: "#ef4444" },
      { name: "No-Show (Member)",   value: 471,  color: "#f97316" },
      { name: "Res. Changed",       value: 221,  color: "#a78bfa" },
      { name: "Cancelled by MTM",   value: 149,  color: "#6b7280" },
      { name: "Other",              value: 141,  color: "#475569" },
    ];

    const MTM_CITIES = [
      { city: "Champaign",   trips: 2102, revenue: 173933 },
      { city: "Danville",    trips: 976,  revenue: 100212 },
      { city: "Marion",      trips: 522,  revenue: 42401  },
      { city: "Decatur",     trips: 601,  revenue: 34104  },
      { city: "Urbana",      trips: 434,  revenue: 24078  },
      { city: "Springfield", trips: 354,  revenue: 24931  },
      { city: "Rantoul",     trips: 230,  revenue: 17320  },
      { city: "Irvington",   trips: 148,  revenue: 15244  },
    ];

    // ── Helpers ───────────────────────────────────────────────────────────────

    const fmt$   = (v) => "$" + Math.round(v).toLocaleString();
    const fmtK   = (v) => (v >= 0 ? "$" : "-$") + (Math.abs(v) / 1000).toFixed(1) + "k";
    const fmtPct = (v) => v.toFixed(1) + "%";

    // ── Design tokens ─────────────────────────────────────────────────────────

    const ACCENT  = "#f97316";
    const BLUE    = "#3b82f6";
    const GREEN   = "#22c55e";
    const RED     = "#ef4444";
    const PURPLE  = "#a78bfa";
    const MUTED   = "#64748b";
    const SURFACE = "#0d1b2a";
    const CARD    = "#111f30";
    const BORDER  = "#1e3348";

    const TooltipStyle = {
      backgroundColor: "#0a1628",
      border: "1px solid #1e3348",
      borderRadius: 8,
      color: "#e2e8f0",
      fontSize: 12,
      boxShadow: "0 8px 24px rgba(0,0,0,0.4)",
    };

    const TABS = ["Overview", "P&L", "MTM Detail", "Modivcare Detail", "Driver Performance"];

    // ── Sub-components ────────────────────────────────────────────────────────

    function StatCard({ label, value, sub, accent, negative }) {
      return (
        <div style={{
          background: `linear-gradient(145deg, ${CARD} 0%, #0d1b2a 100%)`,
          border: `1px solid ${BORDER}`,
          borderTop: `2px solid ${accent || ACCENT}`,
          borderRadius: 10,
          padding: "16px 20px",
        }}>
          <div style={{ color: MUTED, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", fontFamily: "monospace", marginBottom: 6 }}>{label}</div>
          <div style={{ color: negative ? RED : "#f1f5f9", fontSize: 24, fontWeight: 800, lineHeight: 1, letterSpacing: "-0.02em" }}>{value}</div>
          {sub && <div style={{ color: MUTED, fontSize: 11, marginTop: 5 }}>{sub}</div>}
        </div>
      );
    }

    function SectionTitle({ children }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <div style={{ width: 2, height: 14, background: ACCENT, borderRadius: 1 }} />
          <span style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.14em", fontFamily: "monospace" }}>{children}</span>
        </div>
      );
    }

    function BrokerBadge({ broker }) {
      const isMTM = broker === "MTM";
      return (
        <span style={{
          background: isMTM ? "#1e3a5f" : "#2d1b4e",
          color: isMTM ? BLUE : PURPLE,
          border: `1px solid ${isMTM ? "#1e4d8c" : "#5b21b6"}`,
          borderRadius: 4, padding: "1px 7px", fontSize: 10, fontWeight: 700, fontFamily: "monospace",
        }}>{broker}</span>
      );
    }

    function ProfitBadge({ value }) {
      const pos = value >= 0;
      return (
        <span style={{
          background: pos ? "#14532d44" : "#7f1d1d44",
          color: pos ? GREEN : RED,
          border: `1px solid ${pos ? "#166534" : "#991b1b"}`,
          borderRadius: 5, padding: "2px 8px", fontSize: 11, fontWeight: 700, fontFamily: "monospace",
        }}>
          {pos ? "+" : ""}{fmtK(value)}
        </span>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState("Overview");
      const [driverBroker, setDriverBroker] = useState("MTM");

      const mtmTotalRev   = MTM_MONTHLY.reduce((s, m) => s + m.revenue, 0);
      const mdvTotalRev   = MDV_MONTHLY.reduce((s, m) => s + m.revenue, 0);
      const mtmMonths     = MTM_MONTHLY.length;
      const totalExpenses = mtmMonths * MONTHLY_EXPENSES;
      const combinedRev   = mtmTotalRev + mdvTotalRev;
      const overlapMonths = COMBINED_MONTHLY.filter(m => m.expenses > 0);
      const totalNet      = overlapMonths.reduce((s, m) => s + m.net, 0);
      const avgMargin     = (totalNet / combinedRev * 100);

      const drivers       = driverBroker === "MTM" ? MTM_DRIVERS : MDV_DRIVERS;
      const sortedDrivers = [...drivers].sort((a, b) => b.revenue - a.revenue);
      const plMonths      = COMBINED_MONTHLY.filter(m => m.mtmRevenue > 0);

      return (
        <div style={{ minHeight: "100vh", background: SURFACE, fontFamily: "'DM Sans', sans-serif", color: "#e2e8f0", paddingTop: 40 }}>

          {/* Site nav */}
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, height: 40, zIndex: 20,
            background: "#091422", borderBottom: `1px solid ${BORDER}`,
            display: "flex", alignItems: "center", padding: "0 16px", gap: 8,
          }}>
            <span style={{ flex: 1, color: MUTED, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: "monospace" }}>Effingham Transport</span>
            <a href="/nemt-map/" style={{
              display: "inline-block", padding: "4px 12px", borderRadius: 6,
              fontFamily: "monospace", fontSize: 11, fontWeight: 700, textDecoration: "none",
              border: `1px solid ${BORDER}`, background: CARD, color: MUTED,
            }}
              onMouseOver={e => { e.currentTarget.style.background = BORDER; e.currentTarget.style.color = "#e2e8f0"; }}
              onMouseOut={e => { e.currentTarget.style.background = CARD; e.currentTarget.style.color = MUTED; }}
            >Live Map</a>
            <span style={{
              display: "inline-block", padding: "4px 12px", borderRadius: 6,
              fontFamily: "monospace", fontSize: 11, fontWeight: 700,
              border: `1px solid ${ACCENT}`, borderTop: `2px solid ${ACCENT}`,
              background: CARD, color: "#e2e8f0", cursor: "default",
            }}>Analytics Dashboard</span>
          </div>

          {/* Header */}
          <div style={{
            background: "linear-gradient(180deg, #091422 0%, #0d1b2a 100%)",
            borderBottom: `1px solid ${BORDER}`,
            padding: "20px 28px 0",
            position: "sticky", top: 40, zIndex: 10,
          }}>
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 16 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: GREEN, boxShadow: `0 0 6px ${GREEN}` }} />
                  <span style={{ color: MUTED, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", fontFamily: "monospace" }}>Effingham Transport · MTM + Modivcare</span>
                </div>
                <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#f8fafc", letterSpacing: "-0.02em" }}>
                  NEMT Analytics &amp; P&amp;L Dashboard
                </h1>
                <div style={{ color: MUTED, fontSize: 12, marginTop: 2 }}>
                  MTM: Oct &#39;25–Mar &#39;26 · Modivcare: Mar–Apr &#39;26 (partial) · More months incoming
                </div>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "6px 14px", textAlign: "center" }}>
                  <div style={{ color: MUTED, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>MTM Revenue</div>
                  <div style={{ color: BLUE, fontSize: 14, fontWeight: 800, fontFamily: "monospace" }}>{fmtK(mtmTotalRev)}</div>
                </div>
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "6px 14px", textAlign: "center" }}>
                  <div style={{ color: MUTED, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>Modivcare Rev</div>
                  <div style={{ color: PURPLE, fontSize: 14, fontWeight: 800, fontFamily: "monospace" }}>{fmtK(mdvTotalRev)}</div>
                </div>
                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "6px 14px", textAlign: "center" }}>
                  <div style={{ color: MUTED, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>Net (MTM 6mo)</div>
                  <div style={{ color: totalNet >= 0 ? GREEN : RED, fontSize: 14, fontWeight: 800, fontFamily: "monospace" }}>
                    {totalNet >= 0 ? "+" : ""}{fmtK(totalNet)}
                  </div>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 0, overflowX: "auto" }}>
              {TABS.map(t => (
                <button key={t} onClick={() => setTab(t)} style={{
                  background: "none", border: "none", cursor: "pointer",
                  padding: "8px 16px", fontSize: 12, fontWeight: tab === t ? 700 : 400,
                  color: tab === t ? "#f1f5f9" : MUTED,
                  borderBottom: tab === t ? `2px solid ${ACCENT}` : "2px solid transparent",
                  whiteSpace: "nowrap", transition: "all 0.15s",
                }}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "24px 28px" }}>

            {/* ── OVERVIEW ── */}
            {tab === "Overview" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 24 }}>
                  <StatCard label="MTM Revenue (6mo)" value={fmt$(mtmTotalRev)} sub="VALID trips · Oct–Mar" accent={BLUE} />
                  <StatCard label="Modivcare Revenue" value={fmt$(mdvTotalRev)} sub="Mar–Apr '26 partial" accent={PURPLE} />
                  <StatCard label="Combined Revenue" value={fmt$(combinedRev)} sub="Both brokers to date" accent={GREEN} />
                  <StatCard label="Total Expenses (6mo)" value={fmt$(totalExpenses)} sub="$95k × 6 months" accent={RED} />
                  <StatCard label="Net (MTM 6mo basis)" value={(totalNet >= 0 ? "+" : "") + fmt$(totalNet)} sub="MTM rev + Mdv Mar only" accent={totalNet >= 0 ? GREEN : RED} negative={totalNet < 0} />
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
                  <SectionTitle>Monthly Revenue by Broker vs. Expenses</SectionTitle>
                  <ResponsiveContainer width="100%" height={240}>
                    <ComposedChart data={COMBINED_MONTHLY}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} />
                      <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                      <YAxis tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={(v, n) => [fmt$(v), n]} />
                      <Legend formatter={v => <span style={{ color: "#94a3b8", fontSize: 11 }}>{v}</span>} />
                      <Bar dataKey="mtmRevenue" name="MTM Revenue" stackId="rev" fill={BLUE} radius={[0,0,0,0]} />
                      <Bar dataKey="mdvRevenue" name="Modivcare Revenue" stackId="rev" fill={PURPLE} radius={[3,3,0,0]} />
                      <Line type="monotone" dataKey="expenses" name="Expenses" stroke={RED} strokeWidth={1.5} strokeDasharray="5 3" dot={false} />
                    </ComposedChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Broker Revenue Split (to date)</SectionTitle>
                    <div style={{ display: "flex", flexDirection: "column", gap: 16, marginTop: 16 }}>
                      {[
                        { label: "MTM", value: mtmTotalRev, color: BLUE },
                        { label: "Modivcare", value: mdvTotalRev, color: PURPLE },
                      ].map(b => (
                        <div key={b.label}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                            <span style={{ color: "#cbd5e1", fontSize: 13 }}>{b.label}</span>
                            <span style={{ color: b.color, fontWeight: 700 }}>{fmt$(b.value)}</span>
                          </div>
                          <div style={{ background: BORDER, borderRadius: 4, height: 8 }}>
                            <div style={{ width: `${(b.value / combinedRev * 100).toFixed(1)}%`, background: b.color, height: 8, borderRadius: 4 }} />
                          </div>
                          <div style={{ color: MUTED, fontSize: 11, marginTop: 3 }}>{(b.value / combinedRev * 100).toFixed(1)}% of combined revenue</div>
                        </div>
                      ))}
                      <div style={{ background: "#091422", borderRadius: 8, padding: "10px 12px", borderLeft: `2px solid ${ACCENT}`, fontSize: 12, color: "#94a3b8" }}>
                        💡 Modivcare data is partial (2 months). More months incoming will close this gap significantly.
                      </div>
                    </div>
                  </div>

                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Monthly P&amp;L Snapshot (MTM basis)</SectionTitle>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {plMonths.map((m, i) => (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 10px", background: "#0d1b2a", borderRadius: 6, borderLeft: `2px solid ${m.net >= 0 ? GREEN : RED}` }}>
                          <span style={{ color: "#94a3b8", fontSize: 12, fontFamily: "monospace" }}>{m.month}</span>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            {m.mdvRevenue > 0 && <BrokerBadge broker="MDV" />}
                            <ProfitBadge value={m.net} />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── P&L ── */}
            {tab === "P&L" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <StatCard label="MTM Revenue" value={fmt$(mtmTotalRev)} sub="6 months VALID" accent={BLUE} />
                  <StatCard label="Modivcare Revenue" value={fmt$(mdvTotalRev)} sub="Mar–Apr partial" accent={PURPLE} />
                  <StatCard label="Total Expenses" value={fmt$(totalExpenses)} sub="$95k × 6 months" accent={RED} />
                  <StatCard label="Net (6mo)" value={(totalNet >= 0 ? "+" : "") + fmt$(totalNet)} sub={`${fmtPct(Math.abs(avgMargin))} ${avgMargin >= 0 ? "margin" : "deficit"}`} accent={totalNet >= 0 ? GREEN : RED} negative={totalNet < 0} />
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Revenue vs. Expenses by Month</SectionTitle>
                  <ResponsiveContainer width="100%" height={260}>
                    <BarChart data={plMonths} barCategoryGap="30%">
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                      <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                      <YAxis tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={(v, n) => [fmt$(v), n]} />
                      <Legend formatter={v => <span style={{ color: "#94a3b8", fontSize: 11 }}>{v}</span>} />
                      <Bar dataKey="mtmRevenue" name="MTM Revenue" stackId="rev" fill={BLUE} radius={[0,0,0,0]} />
                      <Bar dataKey="mdvRevenue" name="Modivcare Revenue" stackId="rev" fill={PURPLE} radius={[3,3,0,0]} />
                      <Bar dataKey="expenses" name="Expenses" fill={RED} opacity={0.6} radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                    <SectionTitle>Monthly Net Profit</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={plMonths}>
                        <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                        <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                        <YAxis tickFormatter={fmtK} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                        <ReferenceLine y={0} stroke="#334155" strokeWidth={1.5} />
                        <Tooltip contentStyle={TooltipStyle} formatter={v => [fmt$(v), "Net"]} />
                        <Bar dataKey="net" radius={[3,3,0,0]}>
                          {plMonths.map((m, i) => <Cell key={i} fill={m.net >= 0 ? GREEN : RED} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                    <SectionTitle>Cumulative Net Profit</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <LineChart data={plMonths}>
                        <CartesianGrid strokeDasharray="3 3" stroke={BORDER} />
                        <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                        <YAxis tickFormatter={fmtK} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                        <ReferenceLine y={0} stroke="#334155" strokeWidth={1.5} />
                        <Tooltip contentStyle={TooltipStyle} formatter={v => [fmt$(v), "Cumulative"]} />
                        <Line type="monotone" dataKey="cumulative" stroke={ACCENT} strokeWidth={2.5} dot={{ r: 4, fill: ACCENT }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Monthly P&amp;L Detail</SectionTitle>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                        {["Month", "MTM Rev", "MDV Rev", "Combined", "Expenses", "Net", "Margin", "Cumulative"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 10px", color: MUTED, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: "monospace" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {plMonths.map((m, i) => {
                        const margin = m.revenue > 0 ? (m.net / m.revenue * 100) : 0;
                        return (
                          <tr key={i} style={{ borderBottom: `1px solid ${BORDER}33` }}>
                            <td style={{ padding: "10px 10px", fontFamily: "monospace", color: "#cbd5e1", fontSize: 12 }}>{m.month}</td>
                            <td style={{ padding: "10px 10px", color: BLUE }}>{fmt$(m.mtmRevenue)}</td>
                            <td style={{ padding: "10px 10px", color: m.mdvRevenue > 0 ? PURPLE : MUTED }}>{m.mdvRevenue > 0 ? fmt$(m.mdvRevenue) : "—"}</td>
                            <td style={{ padding: "10px 10px", color: GREEN, fontWeight: 600 }}>{fmt$(m.revenue)}</td>
                            <td style={{ padding: "10px 10px", color: "#f87171" }}>{fmt$(m.expenses)}</td>
                            <td style={{ padding: "10px 10px" }}><ProfitBadge value={m.net} /></td>
                            <td style={{ padding: "10px 10px" }}><span style={{ color: margin >= 0 ? ACCENT : RED, fontWeight: 600 }}>{fmtPct(margin)}</span></td>
                            <td style={{ padding: "10px 10px", fontFamily: "monospace", fontSize: 12, color: m.cumulative >= 0 ? "#94a3b8" : RED }}>{m.cumulative != null ? ((m.cumulative >= 0 ? "+" : "") + fmt$(m.cumulative)) : "—"}</td>
                          </tr>
                        );
                      })}
                      <tr style={{ borderTop: `2px solid ${BORDER}`, background: "#091422" }}>
                        <td style={{ padding: "11px 10px", fontWeight: 700, color: "#f1f5f9", fontFamily: "monospace", fontSize: 12 }}>TOTAL</td>
                        <td style={{ padding: "11px 10px", color: BLUE, fontWeight: 700 }}>{fmt$(mtmTotalRev)}</td>
                        <td style={{ padding: "11px 10px", color: PURPLE, fontWeight: 700 }}>{fmt$(mdvTotalRev)}</td>
                        <td style={{ padding: "11px 10px", color: GREEN, fontWeight: 700 }}>{fmt$(combinedRev)}</td>
                        <td style={{ padding: "11px 10px", color: "#f87171", fontWeight: 700 }}>{fmt$(totalExpenses)}</td>
                        <td style={{ padding: "11px 10px" }}><ProfitBadge value={totalNet} /></td>
                        <td style={{ padding: "11px 10px" }}><span style={{ color: avgMargin >= 0 ? ACCENT : RED, fontWeight: 700 }}>{fmtPct(avgMargin)}</span></td>
                        <td style={{ padding: "11px 10px", color: totalNet >= 0 ? GREEN : RED, fontWeight: 700, fontFamily: "monospace", fontSize: 12 }}>{totalNet >= 0 ? "+" : ""}{fmt$(totalNet)}</td>
                      </tr>
                    </tbody>
                  </table>
                  <div style={{ marginTop: 14, padding: "10px 14px", background: "#091422", borderRadius: 8, borderLeft: `2px solid ${ACCENT}`, fontSize: 12, color: MUTED, lineHeight: 1.6 }}>
                    💡 Modivcare data is Mar–Apr only. As more months are added the combined revenue and margin will update. Springfield hub expansion and direct Medicaid billing will further close the deficit.
                  </div>
                </div>
              </div>
            )}

            {/* ── MTM DETAIL ── */}
            {tab === "MTM Detail" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <StatCard label="Valid Trips" value="6,966" sub="69.7% completion" accent={BLUE} />
                  <StatCard label="Total Revenue" value={fmt$(mtmTotalRev)} sub="Oct '25–Mar '26" accent={GREEN} />
                  <StatCard label="Avg / Trip" value="$78.33" sub="Valid trips only" accent={ACCENT} />
                  <StatCard label="Total Miles" value="172,527" sub="Valid trips" accent={BLUE} />
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Monthly Revenue</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={MTM_MONTHLY}>
                        <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                        <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                        <YAxis tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                        <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                        <Bar dataKey="revenue" name="Revenue" fill={BLUE} radius={[3,3,0,0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                    <SectionTitle>Trip Status Breakdown</SectionTitle>
                    <ResponsiveContainer width="100%" height={200}>
                      <PieChart>
                        <Pie data={MTM_STATUS} dataKey="value" cx="42%" cy="50%" innerRadius={45} outerRadius={75} paddingAngle={2}>
                          {MTM_STATUS.map((s, i) => <Cell key={i} fill={s.color} />)}
                        </Pie>
                        <Tooltip contentStyle={TooltipStyle} formatter={v => v.toLocaleString()} />
                        <Legend iconSize={7} iconType="circle" formatter={v => <span style={{ color: "#64748b", fontSize: 10 }}>{v}</span>} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Top Pickup Cities</SectionTitle>
                  <ResponsiveContainer width="100%" height={220}>
                    <BarChart data={MTM_CITIES} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <YAxis dataKey="city" type="category" width={85} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} />
                      <Bar dataKey="trips" name="Trips" radius={[0,3,3,0]}>
                        {MTM_CITIES.map((_, i) => <Cell key={i} fill={i === 0 ? ACCENT : i === 1 ? BLUE : "#1e3a5f"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            {/* ── MODIVCARE DETAIL ── */}
            {tab === "Modivcare Detail" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <StatCard label="Total Trips" value="251" sub="Mar–Apr '26" accent={PURPLE} />
                  <StatCard label="Total Revenue" value={fmt$(mdvTotalRev)} sub="Billed &amp; completed" accent={GREEN} />
                  <StatCard label="Avg / Trip" value="$33.34" sub="vs MTM $78.33" accent={ACCENT} />
                  <StatCard label="Months of Data" value="2" sub="More incoming" accent={PURPLE} />
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Monthly Revenue — Modivcare</SectionTitle>
                  <ResponsiveContainer width="100%" height={180}>
                    <BarChart data={MDV_MONTHLY}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} vertical={false} />
                      <XAxis dataKey="month" tick={{ fill: MUTED, fontSize: 11 }} axisLine={false} tickLine={false} />
                      <YAxis tickFormatter={v => "$" + (v/1000).toFixed(1) + "k"} tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" fill={PURPLE} radius={[3,3,0,0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20 }}>
                  <SectionTitle>Driver Performance — Modivcare</SectionTitle>
                  <ResponsiveContainer width="100%" height={240}>
                    <BarChart data={MDV_DRIVERS} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => "$" + v} />
                      <YAxis dataKey="name" type="category" width={130} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" radius={[0,4,4,0]}>
                        {MDV_DRIVERS.map((_, i) => <Cell key={i} fill={i === 0 ? PURPLE : i === 1 ? ACCENT : "#2d1b4e"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20, borderLeft: `3px solid ${ACCENT}` }}>
                  <SectionTitle>Rate Comparison</SectionTitle>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                    {[
                      { label: "MTM Avg/Trip", value: "$78.33", color: BLUE },
                      { label: "Modivcare Avg/Trip", value: "$33.34", color: PURPLE },
                      { label: "MTM Premium", value: "+135%", color: ACCENT },
                    ].map(s => (
                      <div key={s.label} style={{ background: "#091422", borderRadius: 8, padding: "14px 16px", textAlign: "center" }}>
                        <div style={{ color: MUTED, fontSize: 10, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>{s.label}</div>
                        <div style={{ color: s.color, fontSize: 24, fontWeight: 800 }}>{s.value}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, padding: "10px 14px", background: "#091422", borderRadius: 8, borderLeft: `2px solid ${ACCENT}`, fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>
                    💡 Modivcare pays 135% less per trip than MTM on average. This makes the direct Medicaid billing path especially compelling — cutting out the broker margin entirely.
                  </div>
                </div>
              </div>
            )}

            {/* ── DRIVER PERFORMANCE ── */}
            {tab === "Driver Performance" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ color: MUTED, fontSize: 12 }}>Broker:</span>
                  {["MTM", "Modivcare"].map(b => (
                    <button key={b} onClick={() => setDriverBroker(b)} style={{
                      background: driverBroker === b ? (b === "MTM" ? BLUE : PURPLE) : CARD,
                      border: `1px solid ${driverBroker === b ? (b === "MTM" ? BLUE : PURPLE) : BORDER}`,
                      borderRadius: 6, color: driverBroker === b ? "#fff" : MUTED,
                      padding: "4px 14px", fontSize: 11, cursor: "pointer",
                    }}>{b}</button>
                  ))}
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Driver Revenue — {driverBroker}</SectionTitle>
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={sortedDrivers} layout="vertical" margin={{ left: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke={BORDER} horizontal={false} />
                      <XAxis type="number" tick={{ fill: MUTED, fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => "$" + (v/1000).toFixed(0) + "k"} />
                      <YAxis dataKey="name" type="category" width={145} tick={{ fill: "#cbd5e1", fontSize: 11 }} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={TooltipStyle} formatter={v => fmt$(v)} />
                      <Bar dataKey="revenue" name="Revenue" radius={[0,4,4,0]}>
                        {sortedDrivers.map((_, i) => <Cell key={i} fill={i === 0 ? ACCENT : i === 1 ? (driverBroker === "MTM" ? BLUE : PURPLE) : "#1e3a5f"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 24 }}>
                  <SectionTitle>Driver Metrics — {driverBroker}</SectionTitle>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                        {["Driver", "Trips", "Revenue", "Avg $/Trip"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "8px 12px", color: MUTED, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "monospace" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {sortedDrivers.map((d, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${BORDER}22` }}>
                          <td style={{ padding: "10px 12px", color: i < 3 ? ACCENT : "#cbd5e1", fontWeight: i < 3 ? 600 : 400 }}>
                            {i < 3 && <span style={{ color: ACCENT, marginRight: 6, fontSize: 10, fontFamily: "monospace" }}>#{i+1}</span>}
                            {d.name}
                          </td>
                          <td style={{ padding: "10px 12px" }}>{d.trips.toLocaleString()}</td>
                          <td style={{ padding: "10px 12px", color: GREEN }}>{fmt$(d.revenue)}</td>
                          <td style={{ padding: "10px 12px" }}>${d.avg.toFixed(2)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
